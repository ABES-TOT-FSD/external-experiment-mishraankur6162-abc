<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Flexbox Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


header{
    background:#333;
    color:white;
    padding:15px;
    text-align:center;
}


nav{
    display:flex;
    justify-content:center;
    gap:20px;
    background:#555;
    padding:10px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}


.container{
    display:flex;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

.card{
    flex:1 1 30%;
    background:#f4f4f4;
    padding:20px;
    border-radius:8px;
    text-align:center;
}


footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}


@media (max-width:900px){
    .card{
        flex:1 1 45%;
    }
}


@media (max-width:600px){
    nav{
        flex-direction:column;
        align-items:center;
    }

    .card{
        flex:1 1 100%;
    }
}
</style>
</head>

<body>

<header>
<h1>Responsive Flexbox Website</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<section class="container">
<div class="card">
<h2>Card 1</h2>
<p>Responsive design using flexbox.</p>
</div>

<div class="card">
<h2>Card 2</h2>
<p>Media queries for mobile view.</p>
</div>

<div class="card">
<h2>Card 3</h2>
<p>Flexible layout example.</p>
</div>
</section>

<footer>
<p>© 2026 Responsive Website</p>
</footer>

</body>
</html>
